# Uniquely identifies your project in SonarQube
sonar.projectKey=mock-js-backend
sonar.projectName=Mock JS Backend

# Define the source and test directories
sonar.sources=index.js
sonar.tests=index.test.js

# Tell SonarQube where to find the coverage report generated by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude coverage folder from being analyzed as source code
sonar.exclusions=coverage/**, node_modules/**
